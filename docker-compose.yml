version: '3.8'

services:
  brand-health-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: brand-health-pipeline:latest
    container_name: brand-health-pipeline
    volumes:
      # Mount dataset directory (read-only recommended for safety)
      - ./datasets:/app/datasets:ro
      # Mount output directories (read-write for results)
      - ./reports:/app/reports
      - ./outputs:/app/outputs
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONUNBUFFERED=1
    # Override default command to run full pipeline
    command: >
      python run_pipeline.py
      --dataset-root datasets
      --reports-dir reports
      --outputs-dir outputs
      --artifacts-dir artifacts
      --snapshot-freq 7D
      --report-name brand_health_report.md
    # Resource limits (adjust based on your data size)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

